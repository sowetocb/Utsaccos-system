

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SaccosDB;encrypt=false;trustServerCertificate=true
spring.datasource.username=saccos-user
spring.datasource.password=Password123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Configuration
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Hikari Connection Pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.saccos_system=DEBUG

# JWT Configuration
jwt.secret=your-256-bit-secret-key-must-be-at-least-32-characters-long
jwt.expiration=86400 
  # 24 hours in seconds
jwt.issuer=saccos-system

# OTP Configuration
otp.expiry.minutes=5
otp.length=6
login.max.attempts=5

# SMS Configuration (configure based on your SMS provider)
sms.provider=mock # mock, twilio, aws
# twilio.account-sid=your-account-sid
# twilio.auth-token=your-auth-token
# twilio.phone-number=+1234567890

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG